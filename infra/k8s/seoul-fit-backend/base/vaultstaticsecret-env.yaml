# The Vault document is an env-shaped object. Explicit templates prevent raw
# fields from leaking into the destination and chomp the trailing LF from every
# one-line value (notably DATABASE_URL and OAuth redirect URIs).
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: seoul-fit-backend-env
  labels:
    app.kubernetes.io/name: seoul-fit-backend
    app.kubernetes.io/part-of: seoul-fit
spec:
  vaultAuthRef: seoul-fit-backend
  mount: kv
  type: kv-v2
  path: projects/seoul-fit/backend-PLACEHOLDER
  refreshAfter: 1h
  destination:
    name: seoul-fit-backend-env
    create: true
    transformation:
      excludeRaw: true
      templates:
        DATABASE_URL:
          text: |-
            {{- get .Secrets "DATABASE_URL" -}}
        DATABASE_USERNAME:
          text: |-
            {{- get .Secrets "DATABASE_USERNAME" -}}
        DATABASE_PASSWORD:
          text: |-
            {{- get .Secrets "DATABASE_PASSWORD" -}}
        JWT_SECRET:
          text: |-
            {{- get .Secrets "JWT_SECRET" -}}
        SEOUL_API_KEY:
          text: |-
            {{- get .Secrets "SEOUL_API_KEY" -}}
        KAKAO_CLIENT_ID:
          text: |-
            {{- get .Secrets "KAKAO_CLIENT_ID" -}}
        KAKAO_CLIENT_SECRET:
          text: |-
            {{- get .Secrets "KAKAO_CLIENT_SECRET" -}}
        KAKAO_REDIRECT_URI:
          text: |-
            {{- get .Secrets "KAKAO_REDIRECT_URI" -}}
        CORS_ALLOWED_ORIGINS:
          text: |-
            {{- get .Secrets "CORS_ALLOWED_ORIGINS" -}}
  rolloutRestartTargets:
    - kind: Deployment
      name: seoul-fit-backend
