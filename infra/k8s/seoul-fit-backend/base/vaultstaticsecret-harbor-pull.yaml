# Vault KV contract: projects/seoul-fit/harbor-pull contains username/password.
# VSO derives the kubelet-only docker config; raw robot fields are not projected.
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: seoul-fit-backend-harbor-pull
  labels:
    app.kubernetes.io/name: seoul-fit-backend
    app.kubernetes.io/part-of: seoul-fit
spec:
  vaultAuthRef: seoul-fit-backend
  mount: kv
  type: kv-v2
  path: projects/seoul-fit/harbor-pull
  refreshAfter: 1h
  destination:
    name: seoul-fit-backend-harbor-pull
    create: true
    type: kubernetes.io/dockerconfigjson
    transformation:
      excludeRaw: true
      templates:
        .dockerconfigjson:
          text: |-
            {{- $username := get .Secrets "username" -}}
            {{- $password := get .Secrets "password" -}}
            {{- $auth := printf "%s:%s" $username $password | b64enc -}}
            {{- dict "auths" (dict "registry.damecasol.com" (dict "username" $username "password" $password "auth" $auth)) | mustToJson -}}
