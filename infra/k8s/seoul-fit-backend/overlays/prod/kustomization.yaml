apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: seoul-fit-prod
resources:
  - ../../base
  - namespace.yaml
  # host: seoulfit.damecasol.com (websecure-seoulfit-public listener)
  - httproute.yaml
images:
  - name: registry.damecasol.com/seoul-fit/backend
    newName: registry.damecasol.com/seoul-fit/backend
    digest: sha256:41c82b2445f0487fa288f713dc0856567f2053ffa9646bc6aa69bac8aa1f6484
patches:
  - target:
      kind: Deployment
      name: seoul-fit-backend
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
      # pg-prod NetworkPolicy pg-prod-allow-seoul-fit 계약: 이 라벨이 없으면
      # DB 5432 인입이 차단된다 (infra pg-prod/networkpolicy.yaml).
      - op: add
        path: /spec/template/metadata/labels/needs-pg-prod
        value: "true"
  - target:
      kind: VaultAuth
      name: seoul-fit-backend
    patch: |-
      - op: replace
        path: /spec/kubernetes/role
        value: seoul-fit-prod
  - target:
      kind: VaultStaticSecret
      name: seoul-fit-backend-env
    patch: |-
      - op: replace
        path: /spec/path
        value: projects/seoul-fit/backend-prod
      - op: add
        path: /spec/destination/transformation/templates/SPRING_PROFILES_ACTIVE
        value:
          text: |-
            prod
