server:
  port: 8080

spring:
  application:
    name: seoul-fit-backend
  jpa:
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          batch_size: 100
          batch_versioned_data: true
        order_inserts: true
        order_updates: true
        generate_statistics: false
        cache:
          use_second_level_cache: false
          use_query_cache: false
  security:
    oauth2:
      client:
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

seoul-api:
  v1:
    culture:
      service-name:
        - culturalEventInfo
        - ListPublicReservationCulture
        - culturalSpaceInfo
    environment:
      service-name:
        - RealtimeCityAir
      batch-size: 1000
      retention-days: 30
    amenities:
      service-name:
        - TbGtnHwcwP
    facilities:
      service-name:
        - SeoulPublicLibraryInfo
    park:
      service-name: SearchParkInfoService
      batch-size: 1000
      retention-days: 3
    sports:
      service-name: ListProgramByPublicSportsFacilitiesService
      batch-size: 1000
      retention-days: 3
    restaurant:
      service-name: TbVwRestaurants
      batch-size: 1000
      retention-days: 3

seoulfit:
  api:
    seoul:
      base-url: http://openapi.seoul.go.kr:8088
      timeout: 10
      retry-attempts: 3
  geo:
    csv:
      path: ${GEO_CSV_PATH:classpath:geo/seoul_comprehensive_regions.csv}
  trigger:
    temperature:
      high-threshold: 35.0
      low-threshold: 0.0
    bike:
      shortage-threshold: 10
      full-threshold: 95
      location-radius: 2000
    air-quality:
      bad-levels: ["나쁨", "매우나쁨"]
    congestion:
      high-levels: ["붐빔", "매우붐빔"]
  scheduler:
    enabled: true
    realtime-interval: 300000
    cultural-interval: 1800000
    env-realtime-cron: "0 5 * * * ?"
    env-daily-cron: "0 30 3 * * ?"
    env-weekly-cron: "0 0 2 * * SUN"
    culture:
      daily-cron:
        - "0 1 2 * * ?"
        - "0 2 2 * * ?"
        - "0 3 2 * * ?"
    facilities:
      daily-cron:
        - "0 30 2 * * ?"
        - "0 31 2 * * ?"
    park:
      daily-cron:
        - "0 0 3 * * ?"
    restaurant:
      daily-cron:
        - "0 0 4 * * ?"
    search:
      poi-index:
        cron: "0 0 8 * * *"
      cooling-centers:
        cron: "0 10 8 * * *"
      cultural-events:
        cron: "0 15 8 * * *"
      libraries:
        cron: "0 20 8 * * *"
      parks:
        cron: "0 25 8 * * *"
      restaurants:
        cron: "0 30 8 * * *"

jwt:
  access-token-validity-in-seconds: ${JWT_ACCESS_EXPIRY:1800}
  refresh-token-validity-in-seconds: ${JWT_REFRESH_EXPIRY:1209600}

logging:
  level:
    com.seoulfit.backend: INFO
    org.springframework.web.client: WARN
